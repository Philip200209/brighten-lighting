name = "bright-mpesa-workers"
type = "service"
account_id = "f7792bedfeff89399dc331b8efe37ba6"
main = "index.js"
compatibility_date = "2024-01-01"

[build]
command = "npm install"

[env.production]
name = "bright-mpesa-workers-production"

# Variables (available in env context)
[vars]
MPESA_ENVIRONMENT = "sandbox"
MPESA_TRANSACTION_TYPE = "CustomerPayBillOnline"
MPESA_ACCOUNT_REFERENCE = "Brighten Lighting"
MPESA_TRANSACTION_DESCRIPTION = "Payment for Brighten Lighting"
SUPABASE_URL = "https://beojsdnwcsyygmlkoufe.supabase.co"
MPESA_CALLBACK_URL = "https://brighten-lighting.philipkiprop.workers.dev/api/mpesa-callback"

# Required for server-side payment row creation in Supabase:
# SUPABASE_URL
# SUPABASE_SERVICE_ROLE_KEY

[env.production.vars]
MPESA_ENVIRONMENT = "production"
MPESA_TRANSACTION_TYPE = "CustomerPayBillOnline"
MPESA_ACCOUNT_REFERENCE = "Brighten Lighting"
MPESA_TRANSACTION_DESCRIPTION = "Payment for Brighten Lighting"

# Secrets (set via: wrangler secret put MPESA_CONSUMER_KEY)
# MPESA_CONSUMER_KEY
# MPESA_CONSUMER_SECRET
# MPESA_BUSINESS_SHORT_CODE
# MPESA_PASS_KEY
# MPESA_CALLBACK_URL